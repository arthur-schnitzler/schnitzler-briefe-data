name: Update Wikidata

on:
  schedule:
    - cron: '0 6 1 * *'  # First of each month at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r wikidata/requirements.txt

      - name: Update Wikidata item
        env:
          WIKIDATA_CONSUMER_TOKEN: ${{ secrets.WIKIDATA_CONSUMER_TOKEN }}
          WIKIDATA_CONSUMER_SECRET: ${{ secrets.WIKIDATA_CONSUMER_SECRET }}
          WIKIDATA_ACCESS_TOKEN: ${{ secrets.WIKIDATA_ACCESS_TOKEN }}
          WIKIDATA_ACCESS_SECRET: ${{ secrets.WIKIDATA_ACCESS_SECRET }}
        run: python3 wikidata/update_wikidata.py
